<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="checkGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9BF0FF" />
      <stop offset="100%" style="stop-color:#A3FFBF" />
    </linearGradient>
    <linearGradient id="subtleLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9BF0FF;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#9BF0FF;stop-opacity:0.4" />
      <stop offset="80%" style="stop-color:#A3FFBF;stop-opacity:0.4" />
      <stop offset="100%" style="stop-color:#A3FFBF;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#121212" />

  <!-- Subtle radial glow behind text -->
  <ellipse cx="600" cy="280" rx="400" ry="180" fill="#9BF0FF" opacity="0.03" />

  <!-- Main title -->
  <text x="600" y="290" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="96" font-weight="700" letter-spacing="-2">
    <tspan fill="#F5F2E9">Poop</tspan><tspan fill="url(#checkGradient)">Check</tspan>
  </text>

  <!-- Divider line -->
  <rect x="400" y="320" width="400" height="1.5" rx="1" fill="url(#subtleLine)" />

  <!-- Subtitle -->
  <text x="600" y="375" text-anchor="middle" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="26" font-weight="400" fill="#F5F2E9" opacity="0.6" letter-spacing="0.5">
    AI-Powered Stool Analysis &amp; Gut Health Tracking
  </text>
</svg>
